name: Stage download (hybrid) - Channel 1

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot to stage (1 or 2)"
        required: true
        default: "1"

concurrency:
  group: stage-channel_1
  cancel-in-progress: false

env:
  DB_PAGE_ID: channel_1

jobs:
  stage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: |
          set +e
          sudo apt-get install -y --no-install-recommends --fix-missing ffmpeg 2>/dev/null
          ffmpeg -version >/dev/null 2>&1 && echo "ffmpeg ok" || echo "::warning::ffmpeg missing"
          exit 0

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/channel_1.db
          key: stage-db-channel_1-${{ github.run_id }}
          restore-keys: |
            stage-db-channel_1-

      - name: Write TikTok cookies
        run: |
          if [ -n "${{ secrets.TIKTOK_COOKIES }}" ]; then
            echo "${{ secrets.TIKTOK_COOKIES }}" | base64 -d > /tmp/tiktok_cookies.txt
            echo "TIKTOK_COOKIES_FILE=/tmp/tiktok_cookies.txt" >> $GITHUB_ENV
          fi

      - name: Stage the next video for this slot
        run: python stage_download.py --slot ${{ github.event.inputs.slot }} --channel channel_1

      - name: Upload staged artifact
        if: hashFiles('staging/slot*.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: staged-slot${{ github.event.inputs.slot }}
          path: staging/
          retention-days: 2
          overwrite: true
