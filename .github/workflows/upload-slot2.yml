name: Upload Slot 2 - Channel 1 (10 PM PKT)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Run only this channel ID (leave blank for channel_1)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no actual upload)"
        required: false
        default: "false"

concurrency:
  group: upload-channel_1
  cancel-in-progress: false

env:
  DB_PAGE_ID: channel_1

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: |
          set +e
          # Robust ffmpeg install. Static binary from GitHub-hosted CDN (BtbN) is the
          # primary source -- no apt mirror / libcaca deps. Every download is bounded by
          # connect + max-time timeouts and retried, so a slow server can NEVER hang the
          # run (previous johnvansickle-only path hung 47 min and killed uploads).
          install_static() {
            url="$1"
            for attempt in 1 2 3; do
              echo "ffmpeg static download attempt $attempt: $url"
              if curl -fsSL --connect-timeout 20 --max-time 180 "$url" -o /tmp/ffmpeg.tar.xz; then
                rm -rf /tmp/ffmpeg-static && mkdir -p /tmp/ffmpeg-static
                if tar -xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-static --strip-components 1 2>/dev/null; then
                  BIN=$(find /tmp/ffmpeg-static -name ffmpeg -type f | head -1)
                  PROBE=$(find /tmp/ffmpeg-static -name ffprobe -type f | head -1)
                  if [ -n "$BIN" ]; then
                    sudo cp "$BIN" /usr/local/bin/ffmpeg
                    [ -n "$PROBE" ] && sudo cp "$PROBE" /usr/local/bin/ffprobe
                    sudo chmod +x /usr/local/bin/ffmpeg /usr/local/bin/ffprobe 2>/dev/null
                    return 0
                  fi
                fi
              fi
              sleep 5
            done
            return 1
          }
          # Fast path: apt (often already cached on the runner image)
          sudo apt-get install -y --no-install-recommends --fix-missing ffmpeg 2>/dev/null
          if ffmpeg -version >/dev/null 2>&1 && ffprobe -version >/dev/null 2>&1; then
            echo "ffmpeg available via apt"
          else
            echo "apt ffmpeg unavailable/broken -- installing static binary"
            install_static "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" \
              || install_static "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          fi
          # Report status but NEVER fail the job: short_only channels don't need ffmpeg,
          # and longform/dual will surface a clear error at conversion time if truly missing.
          if ffmpeg -version >/dev/null 2>&1; then
            ffmpeg -version | head -1
            ffprobe -version | head -1
          else
            echo "::warning::ffmpeg not available -- longform/dual conversion will be skipped this run"
          fi
          exit 0

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/channel_1.db
          key: automation-db-channel_1-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            automation-db-channel_1-${{ github.sha }}-

      - name: Restore credentials & tokens
        run: |
          mkdir -p credentials tokens
          if [ -n "${{ secrets.channel_1_CLIENT_SECRET }}" ]; then
            echo "${{ secrets.channel_1_CLIENT_SECRET }}" | base64 -d > credentials/channel_1_client_secret.json
          fi
          if [ -n "${{ secrets.channel_1_TOKEN }}" ]; then
            echo "${{ secrets.channel_1_TOKEN }}" | base64 -d > tokens/channel_1_token.json
          fi

      - name: Write .env
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "DRY_RUN=true" >> .env
          else
            echo "DRY_RUN=false" >> .env
          fi

      - name: Write TikTok cookies
        run: |
          if [ -n "${{ secrets.TIKTOK_COOKIES }}" ]; then
            echo "${{ secrets.TIKTOK_COOKIES }}" | base64 -d > /tmp/tiktok_cookies.txt
            echo "TIKTOK_COOKIES_FILE=/tmp/tiktok_cookies.txt" >> $GITHUB_ENV
          fi

      - name: Run Slot 2
        run: |
          CHANNEL_ARG="--channel channel_1"
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            CHANNEL_ARG="--channel ${{ github.event.inputs.channel }}"
          fi
          python run.py --slot 2 $CHANNEL_ARG

      - name: Save DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/channel_1.db
          key: automation-db-channel_1-${{ github.run_id }}

      - name: Checkpoint DB WAL
        if: always()
        run: |
          if [ -f data/channel_1.db ]; then
            python -c "import sqlite3; c=sqlite3.connect('data/channel_1.db'); r=c.execute('PRAGMA wal_checkpoint(TRUNCATE)').fetchone(); print('WAL checkpoint:', r); c.close()"
          fi

      - name: Commit DB to repo
        if: always()
        run: |
          if [ ! -f data/channel_1.db ]; then
            echo "No DB file found — skipping commit"
            exit 0
          fi
          cp data/channel_1.db /tmp/channel_1_new.db
          git fetch origin main
          git restore data/channel_1.db 2>/dev/null || git checkout -- data/channel_1.db 2>/dev/null || true
          git checkout -B main origin/main
          cp /tmp/channel_1_new.db data/channel_1.db
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/channel_1.db
          if ! git diff --staged --quiet; then
            git commit -m "chore: update channel_1.db [skip ci]"
            for i in 1 2 3; do
              git push origin main && break
              echo "Push failed (attempt $i/3) -- re-basing DB onto latest origin..."
              cp data/channel_1.db /tmp/channel_1_retry.db
              git fetch origin main
              git restore data/channel_1.db 2>/dev/null || git checkout -- data/channel_1.db 2>/dev/null || true
              git checkout -B main origin/main
              cp /tmp/channel_1_retry.db data/channel_1.db
              git add -f data/channel_1.db
              if git diff --staged --quiet; then
                echo "DB already up to date on origin -- nothing to push"
                break
              fi
              git commit -m "chore: update channel_1.db [skip ci]"
            done
          else
            echo "No DB changes to commit"
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-slot2-ch1-${{ github.run_id }}
          path: logs/
          retention-days: 14
