name: Daily Summary (12 AM PKT)

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: yt-uploads
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DB cache (channel_1)
        uses: actions/cache@v4
        with:
          path: data/channel_1.db
          key: automation-db-channel_1-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            automation-db-channel_1-${{ github.sha }}-

      - name: Restore credentials & tokens
        run: |
          mkdir -p credentials tokens
          if [ -n "${{ secrets.channel_1_CLIENT_SECRET }}" ]; then
            echo "${{ secrets.channel_1_CLIENT_SECRET }}" | base64 -d > credentials/channel_1_client_secret.json
          fi
          if [ -n "${{ secrets.channel_1_TOKEN }}" ]; then
            echo "${{ secrets.channel_1_TOKEN }}" | base64 -d > tokens/channel_1_token.json
          fi

      - name: Write .env
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "LOG_LEVEL=INFO" >> .env

      - name: Send daily summary
        run: python run.py --summary-only

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-daily-summary-${{ github.run_id }}
          path: logs/
          retention-days: 14
